<svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="feishu-blue" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3370FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2B5FE6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="feishu-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D6B9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00C4A7;stop-opacity:1" />
